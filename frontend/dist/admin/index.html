<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zing</title> 
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/adminLogin-B2O4vMrx.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/output-Dgd66PKb.css">
  </head>
  <body class="flex justify-center min-h-screen bg-[#030303]">
    <div class="flex flex-col gap-4 items-center justify-between max-w-[635px] min-h-[480px] rounded-xl bg-[#0A0A0A] m-auto p-4 border border-white/10">
      <div class="flex items-center w-[515px] h-[140px] rounded-[50px] bg-[#141414]  border border-white/10 p-8 text-[#efede3]">
        <h1 class="font-['Press_Start_2P'] font-bold whitespace-nowrap text-[28px] tracking-tighter text-shadow-lg/30 uppercase m-auto p-4">welcome to zing</h1>
      </div>
      <div class="flex flex-row gap-[50px] items-center justify-between text-[#efede3]">

        <button class=
        "bg-[#141414] max-w-[175px] p-[12px] rounded-full border border-white/10 font-['Press_Start_2P']
        cursor-pointer active:scale-95 transition-all hover:bg-[#1c1c1c] ease-out duration-300"
        id="signup"
        >
          <span class="text-base font-bold uppercase">signup</span>
        </button>

        <button class=
          "bg-[#141414] max-w-[175px] p-[12px] rounded-full cursor-pointer border border-white/10 
          font-['Press_Start_2P'] active:scale-95 transition-all hover:bg-[#1C1C1C] ease-out duration-300"
          id="login"
          >
          <span class="text-base font-bold uppercase">login</span>
        </button>
      </div>
    </div>

    <div class=
    "opacity-0 pointer-events-none transition-opacity duration-300 fixed
    inset-0 flex cursor-pointer items-center justify-center bg-[#1C1C1C]/60 backdrop-blur-sm z-[100]"
    id="signup-modal"
    >
      <div class=
        "flex flex-col bg-[#0A0A0A] max-w-[400px] w-full shadow-md
        p-4 rounded-xl text-[#efede3] opacity-100 translate-y-8, scale-95"
        id="signup-card">
        <form class="flex flex-col gap-6">
          <div class="flex flex-col gap-2">
            <label for="email" class="text-xs uppercase text-white/50 font-bold">email</label>
            <input type="email" name="email" id="email" placeholder="you@example.com" class=
            "p-3 border border-white/10 rounded-xl focus:outline-none
            focus:border-white/30 transition-all placeholder-white/20 active:scale-95 duration-300"
            >
          </div>
          <div class="flex flex-col gap-2">
            <label for="password" class="text-xs text-white/50 uppercase font-bold">password</label>
            <input type="password" name="password" id="password"  placeholder="••••••••" class=
            "p-3 border border-white/10 rounded-xl focus:outline-none duration-300 active:scale-95
            focus:border-white/30 transition-all placeholder-white/20"
            >
          </div>
          <button class=
          "w-full bg-[#0A0A0A] py-4 mx-0 my-4 hover:bg-white/50 active:scale-95 hover:text-black
          rounded-full duration-300 transition-all border border-white/10 cursor-pointer text-white/70"
          type="submit"
          >
            <span class="text-base uppercase font-bold font-['Press_Start_2P']">sign up</span>
          </button>
        </form>
      </div>
    </div>

     <div class=
    "opacity-0 pointer-events-none transition-opacity duration-300 fixed
    inset-0 flex items-center cursor-pointer justify-center bg-[#1C1C1C]/60 backdrop-blur-sm z-[100]"
    id="login-modal"
    >
      <div class=
        "flex flex-col bg-[#0A0A0A] max-w-[400px] w-full shadow-md
        p-4 rounded-xl text-[#efede3] opacity-0 scale-95 translate-y-8 transition-all"
        id="login-card">
        <form class="flex flex-col gap-6">
          <div class="flex flex-col gap-2">
            <label for="email" class="text-xs uppercase text-white/50 font-bold">email</label>
            <input type="email" name="email" id="email" placeholder="you@example.com" class=
            "p-3 border border-white/10 rounded-xl focus:outline-none
            focus:border-white/30 transition-all placeholder-white/20 active:scale-95 duration-300"
            >
          </div>
          <div class="flex flex-col gap-2">
            <label for="password" class="text-xs text-white/50 uppercase font-bold">password</label>
            <input type="password" name="password" id="password"  placeholder="••••••••" class=
            "p-3 border border-white/10 rounded-xl focus:outline-none duration-300 active:scale-95
            focus:border-white/30 transition-all placeholder-white/20"
            >
          </div>
          <button class=
          "w-full bg-[#0A0A0A] py-4 mx-0 my-4 hover:bg-white/50 active:scale-95 hover:text-black
          rounded-full duration-300 transition-all border border-white/10 cursor-pointer text-white/70"
          type="submit"
          >
            <span class="text-base uppercase font-bold font-['Press_Start_2P']">login</span>
          </button>
        </form>
      </div>
    </div>

  </body>
</html>
