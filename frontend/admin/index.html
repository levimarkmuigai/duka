<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zing</title> 
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="../css/output.css" rel="stylesheet">
  </head>
  <body class="flex justify-center min-h-screen bg-[#0A0A0A]">
    <div class="flex flex-col gap-4 items-center justify-between max-w-[635px] min-h-[480px] rounded-xl bg-[#1C1C1C] m-auto p-4">
      <div class="flex items-center w-[515px] h-[140px] rounded-[50px] bg-[#302f2c] p-8 text-[#efede3]">
        <h1 class=" font-['Press_Start_2P'] font-bold whitespace-nowrap text-[28px] tracking-tighter text-shadow-lg/30 uppercase m-auto p-4">welcome to zing</h1>
      </div>

      <div class="flex flex-row gap-8 items-center justify-between">
       <button class="bg-[#efede3] max-w-[150px] p-[12px] rounded-full font-['Press_Start_2P']
               text-[#000000] transition-colors duration-300 ease-in-out hover:bg-[#d6d4ca]"
               id="signup"
               >
        <span class="text-base font-bold uppercase">signup</span>
       </button>

       <button class="bg-[#302f2c] max-w-[150px] p-[12px] rounded-full font-['Press_Start_2P']
               text-[#000000] transition-colors duration-300 ease-in-out hover:bg-[#242321]"
               id="login"
               >
        <span class="text-base font-bold uppercase">login</span>
       </button>
      </div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-slate-900 backdrop-blur-sm flex items-center justify-center hidden z-[100]">
        <div class=" flex flex-col bg-[#efede3] max-w-[400px] shadow-md  m-auto p-4 rounded-xl">
      <form class="flex flex-col gap-6">

        <div class="flex flex-col gap-2">
          <label for="email" class="text-base uppercase font-bold">email</label>
          <input type="email" name="email" id="email" class="p-3 border border-gray-300">
        </div>

        <div class="flex flex-col gap-2">
          <label for="password" class="text-base uppercase font-bold">password</label>
          <input type="password" name="password" id="password" class="p-3 border border-gray-300">
        </div>

        <button type="submit" class="max-w-full bg-[#ffcc00] hover:bg-[#efede3] py-4 m-8 rounded-full transition-colors">
          <span class="text-base uppercase font-bold font-['Press_Start_2P']">submit</span>
        </button>
      </form>
    </div>
    </div>

    <<script>
      const open = document.getElementById('signup');
      const overlay = document.getElementById('overlay');

      const toggleModal = () => {
        overlay.classList.toggle('hidden');

        document.body.classList.toggle("overflow-hidden")
      };

      open.onclick = toggleModal;
    </script>
  </body>
</html>
